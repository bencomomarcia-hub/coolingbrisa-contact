<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luis - Cooling Brisa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #00132a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: linear-gradient(145deg, #001f4d, #002a6e);
    border: 1px solid #0a5c9a; border-radius: 24px;
    padding: 36px 28px; max-width: 360px; width: 100%;
    text-align: center; box-shadow: 0 0 40px rgba(0,140,255,0.15);
  }
  .logo {
    width: 140px; height: 140px; border-radius: 50%;
    border: 3px solid #0088cc; margin: 0 auto 20px;
    display: block; object-fit: cover;
    box-shadow: 0 0 20px rgba(0,136,204,0.4); background: #001f4d;
  }
  h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .title { color: #4db8ff; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .org { color: #8ab8d8; font-size: 12px; margin-bottom: 24px; }
  .info { margin-bottom: 22px; }
  .info-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left;
  }
  .info-row:last-child { border-bottom: none; }
  .icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
  .info-text { color: #cce4f7; font-size: 14px; }
  .info-label { color: #5a8aaa; font-size: 11px; }
  .btn {
    display: block; background: linear-gradient(135deg, #0088cc, #0055aa);
    color: white; text-decoration: none; padding: 16px; border-radius: 14px;
    font-size: 17px; font-weight: 700; box-shadow: 0 4px 20px rgba(0,136,204,0.4);
    margin-top: 8px;
  }
  .sub { color: #4a7a9b; font-size: 11px; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="logo.png" alt="Cooling Brisa Logo">
  <h1>Luis</h1>
  <div class="title">Sales</div>
  <div class="org">MLJV Services LLC DBA Cooling Brisa</div>
  <div class="info">
    <div class="info-row">
      <span class="icon">📞</span>
      <div><div class="info-text">(754) 304-0544</div><div class="info-label">Work</div></div>
    </div>
    <div class="info-row">
      <span class="icon">💬</span>
      <div><div class="info-text">(786) 878-8873</div><div class="info-label">WhatsApp</div></div>
    </div>
    <div class="info-row">
      <span class="icon">✉️</span>
      <div><div class="info-text">sales@coolingbrisa.net</div><div class="info-label">Email</div></div>
    </div>
    <div class="info-row">
      <span class="icon">🌐</span>
      <div><div class="info-text">www.coolingbrisa.net</div><div class="info-label">Website</div></div>
    </div>
  </div>
  <a class="btn" href="luis.vcf" download="luis-coolingbrisa.vcf">👤 Save Contact</a>
  <p class="sub">Marine HVAC · Refrigeration · Watermakers<br>South Florida</p>
</div>
</body>
</html>
